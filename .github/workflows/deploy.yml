name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT || 22 }}
          script: |
            echo "=== Starting Automated VPS Deployment ==="
            cd /var/www/bkcarreracademy

            echo "📥 Pulling latest code from GitHub..."
            git fetch --all
            git reset --hard origin/main

            echo "📦 Installing Frontend Dependencies & Building Vite Bundle..."
            cd frontend
            npm install
            npm run build

            echo "⚙️ Installing Backend Dependencies & Restarting PM2 Server..."
            cd ../backend
            npm install
            pm2 restart all --update-env
            pm2 save

            echo "🌐 Restarting Nginx Web Server..."
            sudo systemctl restart nginx

            echo "✅ Deployment Completed Successfully!"
