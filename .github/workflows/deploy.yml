name: Continuous Deployment (CI/CD) to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Executing Remote SSH Commands to Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        script: |
          echo "=== Starting Automated VPS Deployment ==="
          
          # Detect Project Directory
          if [ -d "/var/www/bkcarreracademy" ]; then
            cd /var/www/bkcarreracademy
          elif [ -d "/root/BK-Career-Academy" ]; then
            cd /root/BK-Career-Academy
          elif [ -d "/var/www/html" ]; then
            cd /var/www/html
          elif [ -d "/root/bkcarreracademy" ]; then
            cd /root/bkcarreracademy
          else
            echo "❌ Project directory not found!"
            exit 1
          fi

          echo "📂 Current Directory: $(pwd)"

          echo "📥 Pulling latest code from GitHub..."
          git fetch --all
          git reset --hard origin/main

          echo "📦 Installing Frontend Dependencies & Building Vite Bundle..."
          cd frontend
          npm install
          npm run build

          echo "⚙️ Installing Backend Dependencies & Restarting PM2 Server..."
          cd ../backend
          npm install
          pm2 restart all --update-env
          pm2 save

          echo "🌐 Restarting Nginx Web Server..."
          sudo systemctl restart nginx

          echo "✅ Deployment Completed Successfully!"
